<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Crafting Tales</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--surface-2,#f5f1ea); }
    .login-card { background:var(--surface,#fff); padding:2.5rem; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,.08); width:100%; max-width:360px; }
    .login-card h1 { font-size:1.3rem; margin:0 0 1.5rem; }
    .login-field { margin-bottom:1rem; }
    .login-field label { display:block; font-size:.85rem; margin-bottom:.35rem; }
    .login-field input { width:100%; padding:.6rem .75rem; border:1px solid var(--border,#ddd); border-radius:8px; font-size:.95rem; }
    .login-error { color:#c0392b; font-size:.85rem; margin:0 0 1rem; min-height:1.1em; }
    .login-btn { width:100%; padding:.7rem; border:0; border-radius:8px; background:var(--accent,#C69C6D); color:#fff; font-weight:600; cursor:pointer; }
    .login-btn:disabled { opacity:.6; cursor:default; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Crafting Tales — Admin</h1>
    <form id="login-form">
      <div class="login-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <p class="login-error" id="login-error"></p>
      <button type="submit" class="login-btn" id="login-btn">Sign in</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js?v=3"></script>
  <script>
    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('[Admin] getSession failed', err);
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      function timeout(ms) {
        return new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out — check your network/console.')), ms));
      }

      try {
        const result = await Promise.race([
          sb.auth.signInWithPassword({ email, password }),
          timeout(10000)
        ]);
        console.log('[Admin] signIn result', result);

        if (result.error) {
          errEl.textContent = result.error.message || 'Invalid email or password.';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }

        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('[Admin] signIn threw', err);
        errEl.textContent = err.message || 'Something went wrong. Check the console.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
